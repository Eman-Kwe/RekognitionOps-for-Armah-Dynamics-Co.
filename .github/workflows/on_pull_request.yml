name: Analyze Images (PR - Beta)
# Runs every time a Pull Request is opened targeting main
# Processes images in beta environment and stores results in beta_results table

on:
  pull_request:
    branches: [main]
    paths: ['images/**']

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - run: pip install -r requirements.txt

      - name: Analyze images (beta)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          DYNAMODB_TABLE_BETA: ${{ secrets.DYNAMODB_TABLE_BETA }}
          BRANCH: beta
        run: python scripts/analyze_image.py
