name: Analyze Images (PR - Beta)
# Runs every time a Pull Request is opened targeting main
# Processes images in beta environment and stores results in beta_results table

on:
  pull_request:
    branches: [main]                                                   # Only triggers on PRs targeting main branch
    paths: ['images/**']                                               # Only triggers if image files were changed

jobs:
  analyze:
    runs-on: ubuntu-latest                                             # Runs on a fresh GitHub-hosted Linux machine

    steps:
      - uses: actions/checkout@v3                                      # Downloads the repo code onto the runner
      
      - uses: actions/setup-python@v4                                  # Installs Python on the runner
        with:
          python-version: '3.9'                                        # Pins to Python 3.9 for consistency

      - run: pip install -r requirements.txt                           # Installs boto3 and other dependencies

      - name: Analyze images (beta)
        env:
          # AWS credentials injected securely from GitHub Secrets —  Note: Never hardcode these in your codebase!
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          DYNAMODB_TABLE_BETA: ${{ secrets.DYNAMODB_TABLE_BETA }}
          BRANCH: beta                                                    # Tells the script to write results to beta_results table
        run: python scripts/analyze_image.py                              # Uploads image → Rekognition → DynamoDB 